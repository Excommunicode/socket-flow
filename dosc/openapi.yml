openapi: 3.0.3
info:
  title: Socket Flow API
  version: 1.0.0
  description: API for users, messages, device tokens and websocket connections secured by Keycloak.

tags:
  - name: users
    description: Authenticated user endpoints.
  - name: messages
    description: Message search endpoints.
  - name: device-tokens
    description: Device token registration endpoints.
  - name: websocket
    description: Realtime websocket connection endpoint.

paths:
  /ws:
    get:
      tags: [websocket]
      summary: Open websocket connection
      description: Upgrades HTTP connection to WebSocket and registers a client by the Keycloak access token subject. Send the token in `Authorization: Bearer <token>` when the client supports headers, or as `access_token` query parameter for browser WebSocket clients.
      security:
        - keycloakBearer: []
      parameters:
        - name: access_token
          in: query
          required: false
          description: Keycloak access token alternative for clients that cannot send Authorization headers during WebSocket upgrade.
          schema:
            type: string
      responses:
        "101":
          description: WebSocket protocol upgraded successfully.
        "401":
          description: Missing or invalid Keycloak access token.

  /api/messages:
    post:
      tags: [messages]
      summary: Find messages
      description: Returns paginated messages between the authenticated user and another user. `from` is always taken from the Keycloak token subject.
      security:
        - keycloakBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FindMessagesRequest"
      responses:
        "200":
          description: Messages found.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Keycloak access token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/users/me:
    get:
      tags: [users]
      summary: Get current authenticated user
      description: Returns identity claims extracted from the validated Keycloak access token.
      security:
        - keycloakBearer: []
      responses:
        "200":
          description: Current user identity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthenticatedUser"
        "401":
          description: Missing or invalid Keycloak access token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/device-tokens:
    post:
      tags: [device-tokens]
      summary: Register device token
      description: Saves or updates a push notification token for the authenticated Keycloak subject.
      security:
        - keycloakBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterDeviceTokenRequest"
      responses:
        "204":
          description: Device token registered.
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Keycloak access token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    keycloakBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Keycloak access token validated with the realm JWKS.

  schemas:
    FindMessagesRequest:
      type: object
      required: [to]
      properties:
        to:
          type: string
          description: Keycloak subject of the other chat participant.
        limit:
          type: integer
          minimum: 0
          default: 20
        offset:
          type: integer
          minimum: 0
          default: 0

    Message:
      type: object
      properties:
        id:
          type: string
          description: Mongo object id string.
        msg:
          type: string
        from:
          type: string
          description: Keycloak subject of the sender.
        to:
          type: string
          description: Keycloak subject of the recipient.
        isDelivered:
          type: boolean
        modified:
          type: boolean
        createdAt:
          type: string
          format: date-time

    AuthenticatedUser:
      type: object
      properties:
        sub:
          type: string
          description: Keycloak subject.
        username:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string

    RegisterDeviceTokenRequest:
      type: object
      required: [token, platform]
      properties:
        token:
          type: string
        platform:
          type: string
          enum: [android, ios, web]

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        cause:
          type: string
        fix:
          type: string
        timestamp:
          type: string
          format: date-time
