openapi: 3.0.3
info:
  title: Socket Flow API
  version: 1.0.0
  description: API for authentication, users, messages, device tokens and websocket connection.

tags:
  - name: auth
    description: User authentication and session management.
  - name: users
    description: User lookup endpoints.
  - name: messages
    description: Message search endpoints.
  - name: device-tokens
    description: Device token registration endpoints.
  - name: websocket
    description: Realtime websocket connection endpoint.

paths:
  /ws:
    get:
      tags: [websocket]
      summary: Open websocket connection
      description: Upgrades HTTP connection to WebSocket and registers a client by `userId` query param.
      parameters:
        - name: userId
          in: query
          required: true
          description: User UUID used to bind socket connection to a user.
          schema:
            type: string
            format: uuid
      responses:
        "101":
          description: WebSocket protocol upgraded successfully.
        "400":
          description: Invalid or missing userId.
          content:
            text/plain:
              schema:
                type: string
                example: Valid userId is required

  /api/auth/register:
    post:
      tags: [auth]
      summary: Register user
      description: Creates a new user and returns auth tokens. Also sets auth cookies.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterUserRequest"
      responses:
        "201":
          description: User registered and tokens issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokensResponse"
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: User already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/login:
    post:
      tags: [auth]
      summary: Login user
      description: Authenticates user by phone and password, returns tokens and sets auth cookies.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterUserRequest"
      responses:
        "200":
          description: Login successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokensResponse"
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/logout:
    post:
      tags: [auth]
      summary: Logout user
      description: Invalidates current access/refresh token pair from cookies and clears auth cookies.
      responses:
        "200":
          description: Logout successful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: logout successfull
        "401":
          description: Missing/invalid cookies or invalid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "500":
          description: Failed to clear cookies.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"

  /api/auth/refresh:
    post:
      tags: [auth]
      summary: Refresh tokens
      description: Issues a new access and refresh token using `refresh_token` cookie, and resets auth cookies.
      responses:
        "201":
          description: Tokens refreshed successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTokensResponse"
        "401":
          description: Missing/invalid refresh token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "500":
          description: Failed to set auth cookies.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"

  /api/messages:
    post:
      tags: [messages]
      summary: Find messages
      description: Returns paginated messages between two users for the requested current user context.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FindMessagesRequest"
      responses:
        "200":
          description: Messages found.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/users:
    post:
      tags: [users]
      summary: Get user by phone
      description: Finds user by phone number.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRequest"
      responses:
        "200":
          description: User found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/device-tokens:
    post:
      tags: [device-tokens]
      summary: Register device token
      description: Saves or updates push notification token for a user and platform.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterDeviceTokenRequest"
      responses:
        "204":
          description: Device token registered.
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    RegisterUserRequest:
      type: object
      required: [phoneNumber, Password]
      properties:
        phoneNumber:
          type: string
          example: "+77001234567"
        Password:
          type: string
          format: password
          example: "strong-password"

    AuthTokensResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        phone_number:
          type: string

    RefreshTokensResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string

    FindMessagesRequest:
      type: object
      required: [currentUserId, from, to]
      properties:
        currentUserId:
          type: string
          format: uuid
        from:
          type: string
          format: uuid
        to:
          type: string
          format: uuid
        limit:
          type: integer
          minimum: 0
          default: 20
        offset:
          type: integer
          minimum: 0
          default: 0

    Message:
      type: object
      properties:
        id:
          type: string
          description: Mongo object id string.
        msg:
          type: string
        from:
          type: string
          format: uuid
        to:
          type: string
          format: uuid
        isDelivered:
          type: boolean
        modified:
          type: boolean
        createdAt:
          type: string
          format: date-time

    UserRequest:
      type: object
      required: [phoneNumber]
      properties:
        phoneNumber:
          type: string
          example: "+77001234567"

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phoneNumber:
          type: string
        role:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true

    RegisterDeviceTokenRequest:
      type: object
      required: [userId, token, platform]
      properties:
        userId:
          type: string
          format: uuid
        token:
          type: string
        platform:
          type: string
          enum: [android, ios, web]

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        cause:
          type: string
        fix:
          type: string
        timestamp:
          type: string
          format: date-time

    SimpleError:
      type: object
      properties:
        error:
          type: string
