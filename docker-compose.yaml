version: '3.8'

services:
  socket-flow:
    build: .
    image: socket-flow
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - mongodb
      - redis
    env_file:
      - .env

  postgres:
    image: postgres:17-alpine
    container_name: db
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    env_file:
      - .env
    volumes:
      - mongo_data:/data/db

volumes:
  redis_data:
  mongo_data:
  pgdata:
